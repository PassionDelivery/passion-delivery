name: Deploy to AWS

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 \
          | docker login --username AWS --password-stdin <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com

      - name: Build Docker Image
        run: docker build -t passion-delivery .

      - name: Tag Docker Image
        run: docker tag passion-delivery:latest <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/passion-delivery:latest

      - name: Push Docker Image
        run: docker push 782396859217.dkr.ecr.ap-northeast-2.amazonaws.com/passion-delivery:latest
