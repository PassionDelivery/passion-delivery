services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pdelivery
      POSTGRES_USER: pdelivery
      POSTGRES_PASSWORD: pdelivery
    ports:
      - "${LOCAL_TEST_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pdelivery" ]
      interval: 10s
      timeout: 5s
      retries: 5


  app:
    build: .
    ports:
      - "${LOCAL_TEST_APP_PORT:-8081}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
